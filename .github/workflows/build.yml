name: Build and Publish to GitHub Packages on Tag

on:
  push:
    tags:
      - '*' # any tag (e.g. v0.1.0) triggers a build + push to GHCR

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # GHCR requires a lowercase image name (the repo owner has capitals).
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          docker build --build-arg VERSION="$TAG" -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
